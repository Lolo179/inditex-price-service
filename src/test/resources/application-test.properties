# -------------------------------------------------------
# Test profile: overrides for integration tests
# @SpringBootTest tests activate this with @ActiveProfiles("test")
# -------------------------------------------------------

# Dedicated H2 instance for full-stack integration tests (isolated from main app)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Hibernate creates schema from @Entity, data.sql runs after (same as main config)
spring.jpa.hibernate.ddl-auto=create-drop

# Silence logs during tests
logging.level.com.inditex.prices=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=OFF
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Disable H2 console and reduce noise in test output
spring.h2.console.enabled=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
