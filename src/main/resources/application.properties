spring.application.name=price-service

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:pricesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
# Run data.sql after Hibernate creates the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
# SQL logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Parse LocalDateTime request params from ISO 8601 strings (e.g. 2020-06-14T10:00:00)
spring.mvc.format.date-time=iso

# H2 Console (available at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# Logging
logging.level.com.inditex.prices=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
